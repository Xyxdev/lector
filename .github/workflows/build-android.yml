name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform
        run: if [ ! -d "./android" ]; then npx cap add android; fi

      - name: Apply app version
        shell: bash
        run: |
          source version.properties
          GRADLE_FILE="android/app/build.gradle"
          sed -i "s/versionCode [0-9]\+/versionCode $VERSION_CODE/" "$GRADLE_FILE"
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION_NAME\"/" "$GRADLE_FILE"
          grep -E "versionCode|versionName" "$GRADLE_FILE"

      - name: Add VIBRATE permission
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "android.permission.VIBRATE" "$MANIFEST"; then
            sed -i '/<manifest /a\    <uses-permission android:name="android.permission.VIBRATE" />' "$MANIFEST"
          fi

      - name: Generate app icon
        run: npx capacitor-assets generate --android --iconBackgroundColor '#FFFFFF' --iconBackgroundColorDark '#1C1C1E'

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x ./android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: rez-lector-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
