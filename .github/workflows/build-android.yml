name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install

      - name: Prepare web vendor files
        run: npm run prepare:www

      - name: Add Android platform (if missing)
        run: if [ ! -d "./android" ]; then npx cap add android; fi

      - name: Apply app version (versionCode/versionName)
        shell: bash
        run: |
          source version.properties
          GRADLE_FILE="android/app/build.gradle"
          echo "Setting versionCode=$VERSION_CODE versionName=$VERSION_NAME"
          sed -i "s/versionCode [0-9]\+/versionCode $VERSION_CODE/" "$GRADLE_FILE"
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION_NAME\"/" "$GRADLE_FILE"
          grep -E "versionCode|versionName" "$GRADLE_FILE"

      - name: Verify manifest has density in configChanges (Capacitor 8 requirement)
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q 'configChanges="[^"]*density' "$MANIFEST"; then
            echo "::warning::AndroidManifest.xml's configChanges is missing 'density'. This can cause the WebView to reload on resize/rotation on foldables or desktop mode (Capacitor 8 requirement). Adding it now."
            sed -i 's/android:configChanges="\([^"]*\)"/android:configChanges="\1|density"/' "$MANIFEST"
            grep "configChanges" "$MANIFEST"
          else
            echo "configChanges already includes density, OK."
          fi

      - name: Add VIBRATE permission for haptic feedback
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "android.permission.VIBRATE" "$MANIFEST"; then
            sed -i '/<manifest /a\    <uses-permission android:name="android.permission.VIBRATE" />' "$MANIFEST"
          fi

      - name: Generate app icon from source image
        run: npx capacitor-assets generate --android --iconBackgroundColor '#FFFFFF' --iconBackgroundColorDark '#1C1C1E'

      - name: Verify icon files were generated
        run: |
          ICON_DIR="android/app/src/main/res/mipmap-mdpi"
          if [ ! -f "$ICON_DIR/ic_launcher.png" ]; then
            echo "::error::Icon generation failed: $ICON_DIR/ic_launcher.png was not created."
            echo "Contents of android/app/src/main/res/:"
            ls -la android/app/src/main/res/ || true
            exit 1
          fi
          echo "Icon verified at $ICON_DIR/ic_launcher.png"
          ls -la "$ICON_DIR"

      - name: Sync Capacitor (copies www/ into the native project)
        run: npx cap sync android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Make gradlew executable
        run: chmod +x ./android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: rez-lector-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
