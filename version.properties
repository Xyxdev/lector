# Versión de la app para Android (Play Store).
#
# IMPORTANTE: cada vez que subas una actualización a Play Store, el
# versionCode tiene que ser un número ENTERO MÁS ALTO que el de la versión
# anterior ya publicada — Google rechaza el archivo si no lo es. El
# versionName es el texto que ve el usuario (ej. "1.2.0"), puede repetirse
# o no seguir un orden estricto, pero por claridad conviene que also suba.
#
# Como la carpeta android/ se regenera desde cero en cada build de CI (no
# persiste entre ejecuciones), este archivo es la única fuente de verdad
# real de la versión — el workflow lo lee y se lo aplica al proyecto
# Android generado, en vez de depender de los valores default de Capacitor
# (que siempre arrancan en versionCode 1).

VERSION_CODE=1
VERSION_NAME=1.0.0
